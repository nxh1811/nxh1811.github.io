<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <meta name="description" content="xH all in one: All in one toolbox for social media management" />
        <title>xH all in one</title>
        <link rel="icon" href="./logo.svg" />
        <link rel="manifest" href="./manifest.webmanifest">
        <script id="vite-plugin-pwa:register-sw" src="./registerSW.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background-color: #0a0e27;
                color: #ffffff;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                -webkit-font-smoothing: antialiased;
            }
            #root {
                width: 100vw;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            ._init_loading {
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                text-align: center;
            }
            ._init_loading h1 {
                font-size: 48px;
                margin-bottom: 20px;
                background: linear-gradient(135deg, #1677ff, #40a9ff);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            ._loading_spinner {
                width: 50px;
                height: 50px;
                border: 4px solid rgba(22, 119, 255, 0.2);
                border-top: 4px solid #1677ff;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        </style>
    </head>
    <body>
        <div id="root">
            <div class="_init_loading">
                <h1>xH all in one</h1>
                <div class="_loading_spinner"></div>
            </div>
        </div>
    </body>
</html>
